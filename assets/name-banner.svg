<svg width="1600" height="420" viewBox="0 0 1600 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0614"/>
      <stop offset="50%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#0b0614"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5eaff"/>
      <stop offset="50%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#f5eaff"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="24" fill="url(#bg)"/>

  <circle cx="180" cy="80" r="180" fill="#a855f7" opacity="0.10"/>
  <circle cx="1380" cy="320" r="190" fill="#7c3aed" opacity="0.10"/>

  <circle cx="70" cy="45" r="5" fill="#f5eaff">
    <animate attributeName="cy" values="45;35;45" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="505" cy="28" r="5" fill="#c084fc">
    <animate attributeName="cy" values="28;18;28" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1490" cy="70" r="4" fill="#d8b4fe">
    <animate attributeName="cy" values="70;58;70" dur="3.6s" repeatCount="indefinite"/>
  </circle>

  <text x="120" y="85"
        font-family="monospace"
        font-size="34"
        fill="#a855f7">$ ./load_profile</text>

  <text x="120" y="135"
        font-family="monospace"
        font-size="30"
        fill="#ddd6fe">identity:</text>

  <text x="120" y="170"
        font-family="monospace"
        font-size="26"
        fill="#ffffff">GAME DEVELOPER • DESIGNER • CREATIVE BUILDER</text>

  <text x="120" y="205"
        font-family="monospace"
        font-size="22"
        fill="#a78bfa">status: online_</text>

  <g filter="url(#glow)">
    <text x="800" y="300"
          text-anchor="middle"
          font-family="monospace"
          font-size="72"
          font-weight="700"
          letter-spacing="2"
          fill="url(#nameGrad)">
      WENURA THALGAHAGODA
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -10; 0 0; 0 10; 0 0"
        dur="4s"
        repeatCount="indefinite"/>
    </text>
  </g>

  <rect x="8" y="8" width="1584" height="404"
        rx="18"
        fill="none"
        stroke="#c084fc"
        stroke-opacity="0.20"
        stroke-width="2"/>
</svg>

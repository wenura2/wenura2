<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.5" stop-color="#0b1026"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(350 130) rotate(30) scale(280 180)">
      <stop stop-color="#00F5D4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00F5D4" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1220 370) rotate(-15) scale(320 180)">
      <stop stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font: 700 56px 'Segoe UI', Arial, sans-serif;
        fill: #FFFFFF;
        letter-spacing: 1px;
      }
      .subtitle {
        font: 400 24px 'Segoe UI', Arial, sans-serif;
        fill: #A5B4FC;
      }
      .small {
        font: 500 18px 'Segoe UI', Arial, sans-serif;
        fill: #94A3B8;
      }
      .particle {
        opacity: 0.8;
        animation: float 6s ease-in-out infinite;
      }
      .particle2 {
        opacity: 0.7;
        animation: float2 8s ease-in-out infinite;
      }
      .line {
        stroke: rgba(255,255,255,0.08);
        stroke-width: 1;
      }

      @keyframes float {
        0% { transform: translateY(0px); opacity: 0.5; }
        50% { transform: translateY(-18px); opacity: 1; }
        100% { transform: translateY(0px); opacity: 0.5; }
      }

      @keyframes float2 {
        0% { transform: translateY(0px) translateX(0px); opacity: 0.4; }
        50% { transform: translateY(-10px) translateX(8px); opacity: 1; }
        100% { transform: translateY(0px) translateX(0px); opacity: 0.4; }
      }

      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }

      @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
      }
    </style>
  </defs>

  <rect width="1600" height="500" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="460" rx="24" stroke="rgba(255,255,255,0.07)"/>

  <rect width="1600" height="500" fill="url(#glow1)"/>
  <rect width="1600" height="500" fill="url(#glow2)"/>

  <g opacity="0.12">
    <line x1="0" y1="80" x2="1600" y2="80" class="line"/>
    <line x1="0" y1="160" x2="1600" y2="160" class="line"/>
    <line x1="0" y1="240" x2="1600" y2="240" class="line"/>
    <line x1="0" y1="320" x2="1600" y2="320" class="line"/>
    <line x1="0" y1="400" x2="1600" y2="400" class="line"/>

    <line x1="200" y1="0" x2="200" y2="500" class="line"/>
    <line x1="400" y1="0" x2="400" y2="500" class="line"/>
    <line x1="600" y1="0" x2="600" y2="500" class="line"/>
    <line x1="800" y1="0" x2="800" y2="500" class="line"/>
    <line x1="1000" y1="0" x2="1000" y2="500" class="line"/>
    <line x1="1200" y1="0" x2="1200" y2="500" class="line"/>
    <line x1="1400" y1="0" x2="1400" y2="500" class="line"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="120" cy="100" r="4" fill="#00F5D4" class="particle"/>
    <circle cx="190" cy="170" r="3" fill="#38BDF8" class="particle2"/>
    <circle cx="260" cy="90" r="5" fill="#A78BFA" class="particle"/>
    <circle cx="340" cy="150" r="3.5" fill="#00F5D4" class="particle2"/>
    <circle cx="1250" cy="120" r="4" fill="#A78BFA" class="particle"/>
    <circle cx="1320" cy="200" r="3" fill="#38BDF8" class="particle2"/>
    <circle cx="1430" cy="110" r="5" fill="#00F5D4" class="particle"/>
    <circle cx="1490" cy="190" r="3.5" fill="#A78BFA" class="particle2"/>
    <circle cx="1350" cy="360" r="4" fill="#00F5D4" class="particle"/>
    <circle cx="1460" cy="410" r="3" fill="#38BDF8" class="particle2"/>
    <circle cx="250" cy="390" r="4" fill="#A78BFA" class="particle"/>
    <circle cx="140" cy="430" r="3" fill="#00F5D4" class="particle2"/>
  </g>

  <g class="pulse">
    <circle cx="1330" cy="250" r="80" fill="none" stroke="rgba(0,245,212,0.15)" stroke-width="2"/>
    <circle cx="1330" cy="250" r="120" fill="none" stroke="rgba(124,58,237,0.12)" stroke-width="2"/>
    <circle cx="1330" cy="250" r="160" fill="none" stroke="rgba(56,189,248,0.10)" stroke-width="2"/>
  </g>

  <g>
    <text x="90" y="190" class="title">WENURA THALGAHAGODA</text>
    <text x="90" y="235" class="subtitle">Creative Developer • UI/UX Designer • Illustrator</text>
    <text x="90" y="290" class="small">Building dark, modern and interactive digital experiences</text>
  </g>

  <g opacity="0.9">
    <rect x="90" y="340" width="170" height="46" rx="23" fill="rgba(0,245,212,0.08)" stroke="rgba(0,245,212,0.35)"/>
    <text x="125" y="370" class="small" fill="#E2E8F0">Software Engineer</text>

    <rect x="280" y="340" width="130" height="46" rx="23" fill="rgba(124,58,237,0.08)" stroke="rgba(167,139,250,0.35)"/>
    <text x="317" y="370" class="small" fill="#E2E8F0">Designer</text>

    <rect x="430" y="340" width="145" height="46" rx="23" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.35)"/>
    <text x="466" y="370" class="small" fill="#E2E8F0">Game Dev</text>
  </g>
</svg>

<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#120018"/>
      <stop offset="50%" stop-color="#1A0933"/>
      <stop offset="100%" stop-color="#090014"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 170) rotate(20) scale(320 220)">
      <stop stop-color="#D946EF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#D946EF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1300 280) rotate(-10) scale(360 220)">
      <stop stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font: 700 58px Arial, sans-serif;
        fill: #F5E9FF;
        letter-spacing: 2px;
      }
      .subtitle {
        font: 400 24px Arial, sans-serif;
        fill: #D8B4FE;
      }
      .tag {
        font: 500 18px Arial, sans-serif;
        fill: #F3E8FF;
      }
      .small {
        font: 400 16px Arial, sans-serif;
        fill: #C4B5FD;
      }
      .particleA {
        animation: floatA 5s ease-in-out infinite;
      }
      .particleB {
        animation: floatB 7s ease-in-out infinite;
      }
      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }
      @keyframes floatA {
        0% { transform: translateY(0px); opacity: 0.5; }
        50% { transform: translateY(-15px); opacity: 1; }
        100% { transform: translateY(0px); opacity: 0.5; }
      }
      @keyframes floatB {
        0% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
        50% { transform: translateY(-12px) translateX(8px); opacity: 0.9; }
        100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
      }
      @keyframes pulse {
        0% { opacity: 0.35; }
        50% { opacity: 0.95; }
        100% { opacity: 0.35; }
      }
    </style>
  </defs>

  <rect width="1600" height="500" rx="30" fill="url(#bg)"/>
  <rect width="1600" height="500" fill="url(#glowLeft)"/>
  <rect width="1600" height="500" fill="url(#glowRight)"/>

  <g opacity="0.12">
    <line x1="0" y1="80" x2="1600" y2="80" stroke="#ffffff"/>
    <line x1="0" y1="160" x2="1600" y2="160" stroke="#ffffff"/>
    <line x1="0" y1="240" x2="1600" y2="240" stroke="#ffffff"/>
    <line x1="0" y1="320" x2="1600" y2="320" stroke="#ffffff"/>
    <line x1="0" y1="400" x2="1600" y2="400" stroke="#ffffff"/>

    <line x1="200" y1="0" x2="200" y2="500" stroke="#ffffff"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#ffffff"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#ffffff"/>
    <line x1="800" y1="0" x2="800" y2="500" stroke="#ffffff"/>
    <line x1="1000" y1="0" x2="1000" y2="500" stroke="#ffffff"/>
    <line x1="1200" y1="0" x2="1200" y2="500" stroke="#ffffff"/>
    <line x1="1400" y1="0" x2="1400" y2="500" stroke="#ffffff"/>
  </g>

  <g filter="url(#blurGlow)">
    <circle cx="110" cy="110" r="4" fill="#E879F9" class="particleA"/>
    <circle cx="180" cy="180" r="3" fill="#A855F7" class="particleB"/>
    <circle cx="260" cy="130" r="5" fill="#C084FC" class="particleA"/>
    <circle cx="330" cy="210" r="4" fill="#D946EF" class="particleB"/>

    <circle cx="1280" cy="130" r="4" fill="#E879F9" class="particleA"/>
    <circle cx="1360" cy="200" r="3" fill="#A855F7" class="particleB"/>
    <circle cx="1440" cy="150" r="5" fill="#C084FC" class="particleA"/>
    <circle cx="1500" cy="230" r="4" fill="#D946EF" class="particleB"/>

    <circle cx="260" cy="390" r="4" fill="#A855F7" class="particleA"/>
    <circle cx="1320" cy="380" r="4" fill="#C084FC" class="particleB"/>
  </g>

  <g class="pulse">
    <circle cx="1320" cy="250" r="70" fill="none" stroke="#C084FC" stroke-opacity="0.25" stroke-width="2"/>
    <circle cx="1320" cy="250" r="110" fill="none" stroke="#A855F7" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="1320" cy="250" r="150" fill="none" stroke="#E879F9" stroke-opacity="0.12" stroke-width="2"/>
  </g>

  <text x="90" y="180" class="title">WENURA THALGAHAGODA</text>
  <text x="90" y="225" class="subtitle">Cyberpunk Developer • Game Creator • UI/UX Designer</text>
  <text x="90" y="270" class="small">Building dark fantasy inspired interactive experiences</text>

  <g>
    <rect x="90" y="330" width="170" height="44" rx="22" fill="#A855F722" stroke="#C084FC66"/>
    <text x="120" y="358" class="tag">Game Developer</text>

    <rect x="280" y="330" width="150" height="44" rx="22" fill="#D946EF22" stroke="#E879F966"/>
    <text x="320" y="358" class="tag">UI/UX Design</text>

    <rect x="450" y="330" width="165" height="44" rx="22" fill="#7C3AED22" stroke="#A78BFA66"/>
    <text x="487" y="358" class="tag">Illustration</text>
  </g>
</svg>
